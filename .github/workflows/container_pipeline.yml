name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      dockerfile:
        required: false
        type: string
        default: 'docker/Dockerfile'
      build_context:
        required: false
        type: string
        default: '.'
    secrets:
      DOCKER_REGISTRY:
        required: false
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      DOCKER_REPOSITORY:
        required: false

jobs:
  publish-docker:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image = <docker-hub-user>/<repo-name>, e.g. knucklessg1/openbao-mcp
          # (matches the *-mcp Portainer stack image refs). Derived from the repo
          # name so no per-repo DOCKER_REPOSITORY secret is needed — the previous
          # ${DOCKER_REGISTRY}/${DOCKER_REPOSITORY} produced an invalid "***/:tag"
          # when DOCKER_REPOSITORY was unset.
          images: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: false
          # Layer cache lives in the image registry, NOT type=gha. The GitHub
          # Actions cache hands buildx a SAS token with a fixed ~1h lifetime;
          # any Docker build slower than that fails the cache export with
          # "403 AuthenticationFailed / Signature not valid in the specified
          # time frame". Builds here routinely exceed 1h when cold, so the
          # export always failed -> the cache never persisted -> every build
          # ran cold -> always >1h: a self-reinforcing failure loop. Registry
          # cache has no SAS expiry and is SHARED across all self-hosted
          # runners (type=local would be per-runner and miss after scale-out).
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:buildcache,mode=max
