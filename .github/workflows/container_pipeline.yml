name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      dockerfile:
        required: false
        type: string
        default: 'docker/Dockerfile'
      build_context:
        required: false
        type: string
        default: '.'
    secrets:
      DOCKER_REGISTRY:
        required: false
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      DOCKER_REPOSITORY:
        required: false

jobs:
  publish-docker:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image = <docker-hub-user>/<repo-name>, e.g. knucklessg1/openbao-mcp
          # (matches the *-mcp Portainer stack image refs). Derived from the repo
          # name so no per-repo DOCKER_REPOSITORY secret is needed — the previous
          # ${DOCKER_REGISTRY}/${DOCKER_REPOSITORY} produced an invalid "***/:tag"
          # when DOCKER_REPOSITORY was unset.
          images: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: false
          # ignore-error: a flaky GHA-cache backend (Azure SAS token expiring on long
          # builds → "Signature not valid in the specified time frame", or transient cache
          # auth) must NOT fail an otherwise-successful image build/push. Cache is an
          # optimization, never a gate.
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
